name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  typecheck:
    name: Type Check (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, auth-service, usage-service, ai-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.service }}
      - run: npx tsc --noEmit
        working-directory: ${{ matrix.service }}

  test:
    name: API Gateway Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
      mongo:
        image: mongo:6
        ports: ["27017:27017"]
        options: --health-cmd "mongosh --eval 'db.runCommand({ping:1})'" --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api-gateway/package-lock.json
      - run: npm ci
        working-directory: api-gateway
      - run: npm test
        working-directory: api-gateway
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MONGO_URI: mongodb://localhost:27017/test-db
          AUTH_SERVICE_URL: http://localhost:4001
          USAGE_SERVICE_URL: http://localhost:4002
          AI_SERVICE_URL: http://localhost:4003
          SERVICE_NAME: gateway-test
          NODE_ENV: test

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, auth-service, usage-service, ai-service, nginx]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t infergate-${{ matrix.service }}:ci ./${{ matrix.service }}
